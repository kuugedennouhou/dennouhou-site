<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>空華電脳幇</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
</head>

<body>
  <main class="site">
    <section class="hero">
      <div class="hero-image" style="background-image: url('assets/images/header.webp');"></div>

      <div class="bio">
        <p class="site-subtitle">
          電脳の片隅にある、空華椿祈の個人SNS風サイト。
        </p>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab" data-tab="about">About</button>
      <button class="tab" data-tab="all">All</button>
      <button class="tab" data-tab="post">Post</button>
      <button class="tab" data-tab="notice">Notice</button>
      <button class="tab" data-tab="stream">Stream</button>
      <button class="tab" data-tab="archive">Archive</button>
    </nav>

<section id="about" class="panel">
  <div class="card about-card">
    <div class="social-links">
      <a href="#" data-social="x" target="_blank" rel="noopener noreferrer" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#" data-social="twitch" target="_blank" rel="noopener noreferrer" aria-label="Twitch"><i class="fa-brands fa-twitch"></i></a>
      <a href="#" data-social="youtube" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
    </div>

    <div class="about-divider"></div>

    <div class="accordion about-links">
      <div class="accordion-item">
        <button class="accordion-button">
          Links
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-links"></div>
      </div>
    </div>

    <div class="about-divider"></div>

    <div class="accordion">
      <div class="accordion-item">
        <button class="accordion-button">
          Profile
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-profile"></div>
      </div>

      <div class="accordion-item">
        <button class="accordion-button">
          Hashtags
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-hashtags"></div>
      </div>

      <div class="accordion-item">
        <button class="accordion-button">
          Activities
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-activities"></div>
      </div>

      <div class="accordion-item">
        <button class="accordion-button">
          Contact
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-contact"></div>
      </div>

      <div class="accordion-item">
        <button class="accordion-button">
          Rule
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-rule"></div>
      </div>

      <div class="accordion-item">
        <button class="accordion-button">
          FAQ
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-faq"></div>
      </div>

      <div class="accordion-item">
        <button class="accordion-button">
          Privacy Policy
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="accordion-content" id="about-privacy-policy"></div>
      </div>
    </div>
  </div>
</section>

    <section id="all" class="panel">
      <article class="card">
        <div class="card-meta">POST-000001 / 2026/06/16</div>
        <div class="card-body">ここにAllタブの投稿一覧が入ります。</div>
      </article>
    </section>

    <section id="post" class="panel">
      <article class="card">
        <div class="card-meta">Post</div>
        <div class="card-body">通常投稿が入ります。</div>
      </article>
    </section>

    <section id="notice" class="panel">
      <article class="card">
        <span class="notice-label">告知</span>
        <div class="card-body">Notice投稿が入ります。</div>
      </article>
    </section>

    <section id="stream" class="panel">
      <article class="card">
        <div class="card-meta">Stream</div>
        <div class="card-body">配信予定・配信中情報が入ります。</div>
      </article>
    </section>

    <section id="archive" class="panel">
      <div class="empty">Archiveは後で実装します。</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
